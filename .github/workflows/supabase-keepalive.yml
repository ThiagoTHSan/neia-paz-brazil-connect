# WHY: Projetos Supabase no plano gratuito podem ser pausados após período sem atividade.
# Este job gera tráfego legítimo contra a API (health) para manter o projeto "acordado".
name: Supabase keep-alive

on:
  schedule:
    # Diariamente 09:00 UTC — ajuste se quiser outro horário (cron é sempre UTC no GitHub).
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (Auth health)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          # WHY: Secrets copiados no Windows/as web às vezes trazem \r, aspas ou espaços — quebram o host e geram curl exit 6.
          trim_secret() {
            printf '%s' "$1" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/^"//;s/"$//'
          }
          SUPABASE_URL="$(trim_secret "${SUPABASE_URL}")"
          SUPABASE_ANON_KEY="$(trim_secret "${SUPABASE_ANON_KEY}")"
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Configure os secrets do repositório: SUPABASE_URL e SUPABASE_ANON_KEY (mesmos valores de VITE_SUPABASE_* no .env.local)."
            exit 1
          fi
          # WHY: `curl` exit code 6 geralmente é URL/host inválido. Evita debug às cegas.
          if ! echo "${SUPABASE_URL}" | grep -Eq '^https?://'; then
            echo "::error::SUPABASE_URL inválida. Use o formato completo com https:// (ex.: https://xxxxx.supabase.co)."
            exit 1
          fi
          base="${SUPABASE_URL%/}"
          host="${base#*://}"
          host="${host%%/*}"
          if ! getent ahosts "${host}" >/dev/null 2>&1; then
            echo "::error::DNS não resolve '${host}'. Use exatamente a **Project URL** em Supabase: Settings → API (não confunda com outro ID). Cole de novo o valor de VITE_SUPABASE_URL no secret SUPABASE_URL."
            exit 1
          fi
          set +e
          code=$(curl -sS -o /tmp/supabase_keepalive.json -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${base}/auth/v1/health")
          curl_exit=$?
          set -e
          if [ "$curl_exit" -ne 0 ]; then
            echo "::error::Falha ao conectar no Supabase (curl exit code: ${curl_exit}). Host usado: ${host}"
            echo "Supabase base URL (sem barra final): ${base}"
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::error::Supabase respondeu HTTP $code"
            cat /tmp/supabase_keepalive.json || true
            exit 1
          fi
          echo "Keep-alive OK (HTTP $code)"
